<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Studio</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f8fa;--bg3:#f0f1f4;
  --text:#1a1a2e;--text2:#4a5568;--text3:#9ca3af;
  --border:#e5e7eb;--border2:#d1d5db;
  --purple:#5B4FCF;--purple-light:#EAE8FA;
  --teal:#1D9E75;--teal-light:#E2F5EE;
  --amber:#BA7517;--amber-light:#FDF3E0;
  --red:#D85A30;--red-light:#FDEEE8;
  --blue:#2F6FBE;--blue-light:#E5EFF9;
  --green:#15803d;--green-light:#dcfce7;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:var(--text);background:var(--bg2);font-size:14px;line-height:1.6}

/* ── Layout ── */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.topbar-logo{font-size:15px;font-weight:600;color:var(--purple);display:flex;align-items:center;gap:8px}
.topbar-logo svg{width:20px;height:20px}
.topbar-nav{display:flex;gap:4px}
.topbar-right{display:flex;align-items:center;gap:10px}
.content{flex:1;padding:28px 24px;max-width:900px;margin:0 auto;width:100%}

/* ── Tabs ── */
.tab{padding:6px 14px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit;transition:background .12s}
.tab:hover{background:var(--bg2)}
.tab.active{background:var(--bg2);color:var(--text);font-weight:500}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:13px;font-family:inherit;color:var(--text);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn.primary:hover{opacity:.86}
.btn.danger{color:var(--red);border-color:#fca5a5}
.btn.danger:hover{background:var(--red-light)}
.btn.ghost{border:none;padding:6px 8px;background:transparent}
.btn.ghost:hover{background:var(--bg2)}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.icon{padding:6px;border-radius:var(--radius)}

/* ── Forms ── */
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;transition:border .12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--purple)}
textarea{resize:vertical;min-height:80px}
label.lbl{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}

/* ── Cards ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px}
.card.clickable{cursor:pointer;transition:border-color .12s}
.card.clickable:hover{border-color:var(--border2)}
.card.selected{border-color:var(--purple)}

/* ── Chips ── */
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.chip{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit;transition:all .12s}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.selected{background:var(--text);color:var(--bg);border-color:var(--text)}
.chip.muted{opacity:.5}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge.success{background:var(--green-light);color:var(--green)}
.badge.warning{background:var(--amber-light);color:var(--amber)}
.badge.danger{background:var(--red-light);color:var(--red)}
.badge.info{background:var(--blue-light);color:var(--blue)}
.badge.neutral{background:var(--bg2);color:var(--text2)}
.badge.purple{background:var(--purple-light);color:var(--purple)}

/* ── Misc ── */
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px}
.divider{height:1px;background:var(--border);margin:20px 0}
.row{display:flex;gap:12px}
.col{flex:1}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── Metric cards ── */
.metric{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── Progress ── */
.progress{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:24px}
.progress-fill{height:100%;background:var(--purple);border-radius:2px;transition:width .3s}

/* ── Step nav ── */
.step-pills{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.step-pill{font-size:12px;padding:4px 10px;border-radius:20px;color:var(--text3)}
.step-pill.active{background:var(--text);color:var(--bg)}

/* ── Nav footer ── */
.nav-footer{display:flex;justify-content:space-between;margin-top:28px;padding-top:16px;border-top:1px solid var(--border)}

/* ── Project list ── */
.project-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .12s}
.project-card:hover{border-color:var(--border2)}
.proj-icon{width:38px;height:38px;border-radius:var(--radius);background:var(--purple-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:var(--purple)}
.proj-meta{flex:1;min-width:0}
.proj-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-info{font-size:12px;color:var(--text3);margin-top:2px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.proj-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Empty state ── */
.empty{text-align:center;padding:72px 20px}
.empty-icon{font-size:40px;margin-bottom:14px}
.empty-title{font-size:16px;font-weight:500;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text3);margin-bottom:20px}

/* ── Proposal ── */
.proposal-heading{font-size:16px;font-weight:600;margin:24px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.proposal-text{font-size:14px;color:var(--text2);line-height:1.8}
.proposal-list{list-style:none;padding:0}
.proposal-list li{padding:5px 0;font-size:14px;color:var(--text2);display:flex;gap:8px}
.proposal-list li::before{content:"→";color:var(--text3);flex-shrink:0}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{padding:3px 10px;border-radius:20px;font-size:12px;background:var(--bg2);color:var(--text2)}

/* ── Price table ── */
.price-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.price-table th{text-align:left;padding:8px 12px;background:var(--bg2);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.price-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.price-table tr:last-child td{border:none}
.price-table tr.total td{font-weight:600;font-size:15px;background:var(--purple-light);color:var(--purple)}
.price-table tr.base td{color:var(--text2)}

/* ── Risk blocks ── */
.risk-block{border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px}
.risk-block.high{background:var(--red-light);border:1px solid #fca5a5}
.risk-block.med{background:var(--amber-light);border:1px solid #fcd34d}
.risk-block-title{font-size:13px;font-weight:600;margin-bottom:8px}
.risk-block.high .risk-block-title{color:var(--red)}
.risk-block.med .risk-block-title{color:var(--amber)}
.risk-item{font-size:13px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.risk-item:last-child{border:none}
.risk-block.high .risk-item{color:var(--red)}
.risk-block.med .risk-item{color:var(--amber)}

/* ── Admin ── */
.admin-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.admin-item:last-child{border:none}
.admin-label{flex:1;font-size:13px}
.admin-inputs{display:flex;gap:6px;align-items:center}
.admin-inputs input{width:64px;text-align:center;padding:5px 8px;font-size:12px}
.admin-inputs select{width:100px;font-size:12px;padding:5px 8px}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;width:100%;max-width:460px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.export-opt{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;margin-bottom:8px;transition:all .12s}
.export-opt:hover{border-color:var(--border2);background:var(--bg2)}
.export-icon{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.export-name{font-size:14px;font-weight:500}
.export-desc{font-size:12px;color:var(--text3);margin-top:2px}

/* ── Auth ── */
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg2)}
.auth-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;text-align:center;max-width:380px;width:100%}
.auth-logo{font-size:28px;font-weight:700;color:var(--purple);margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--text3);margin-bottom:32px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px 16px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;transition:background .12s}
.google-btn:hover{background:var(--bg2)}
.google-btn img{width:18px;height:18px}

/* ── Loading ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;color:var(--text3)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── User avatar ── */
.avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--border)}
.avatar-initial{width:32px;height:32px;border-radius:50%;background:var(--purple-light);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
</style>
</head>

</div>

<div id="modal-root"></div>

firebase.initializeApp(firebaseConfig);

let currentUser = null;

let editId      = null;
let unsubProjects = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  document.getElementById('screen-loading').style.display = 'none';
  if (user) {
    currentUser = user;
    document.getElementById('screen-auth').style.display = 'none';
    document.getElementById('screen-app').style.display  = 'flex';
    document.getElementById('user-name').textContent = user.displayName?.split(' ')[0] || '';
    const av = document.getElementById('user-avatar');
    if (user.photoURL) {
      av.innerHTML = `<img class="avatar" src="${user.photoURL}" alt="">`;
    } else {
      av.innerHTML = `<div class="avatar-initial">${(user.displayName||user.email||'U')[0].toUpperCase()}</div>`;
    }
    subscribeProjects();
    showView('dashboard');
  } else {
    currentUser = null;
    if (unsubProjects) { unsubProjects(); unsubProjects = null; }
    document.getElementById('screen-auth').style.display = 'flex';
    document.getElementById('screen-app').style.display  = 'none';
  }
});

function signInGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => alert('Erro no login: ' + e.message));
}

function signOut() {
  if (confirm('Sair do Briefing Studio?')) auth.signOut();
}

// ── Firestore ─────────────────────────────────────────────────────────────────
function userRef() {
  return db.collection('users').doc(currentUser.uid);
}

function projectsRef() {
  return userRef().collection('projects');
}

function subscribeProjects() {
  if (unsubProjects) unsubProjects();
  unsubProjects = projectsRef()
    .orderBy('updatedAt', 'desc')
    .onSnapshot(snap => {
      projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (view === 'dashboard') render();
    }, err => console.error('Firestore error:', err));
}

async function saveProject(proj) {
  const now = firebase.firestore.FieldValue.serverTimestamp();
  if (proj.id) {
    await projectsRef().doc(proj.id).set({ ...proj, updatedAt: now });
    return proj.id;
  } else {
    const ref = await projectsRef().add({ ...proj, createdAt: now, updatedAt: now });
    return ref.id;
  }
}

async function deleteProject(id) {
  await projectsRef().doc(id).delete();
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function calcImpacts(p) {
  let tTime = 0, tPrice = 0;
  DATA.phases.forEach(ph => ph.items.forEach(it => {
    if (p.selectedPhases?.[it.id]) { tTime += it.timeImpact; tPrice += it.priceImpact; }
  }));
  DATA.details.forEach(d => {
    const s = p.selectedDetails?.[d.id];
    if (s !== undefined) { tTime += d.timeImpact[s]; tPrice += d.priceImpact[s]; }
  });
  return { tTime: Math.round(tTime), tPrice: Math.round(tPrice) };
}

function calcMoney(p) {
  const { tPrice, tTime } = calcImpacts(p);
  const hours = parseFloat(p.baseHours) || 0;
  const hoursTotal = Math.round(hours * (1 + tTime / 100));
  if (p.pricingMode === 'hourly') {
    const rate = parseFloat(p.hourlyRate) || 0;
    return { base: Math.round(hours * rate), total: Math.round(hoursTotal * rate), hoursTotal, tPrice, rate };
  }
  const base = parseFloat(p.basePrice) || 0;
  return { base, total: Math.round(base * (1 + tPrice / 100)), hoursTotal, tPrice, rate: 0 };
}

function fmt(v, cur = 'BRL') {
  if (!v) return '—';
  const locale = cur === 'BRL' ? 'pt-BR' : cur === 'EUR' ? 'de-DE' : 'en-US';
  return new Intl.NumberFormat(locale, { style: 'currency', currency: cur, maximumFractionDigits: 0 }).format(v);
}

function riskOf(p) {
  const risks = [];
  DATA.phases.forEach(ph => ph.items.forEach(it => { if (p.selectedPhases?.[it.id]) risks.push(it.risk); }));
  DATA.details.forEach(d => { const s = p.selectedDetails?.[d.id]; if (s !== undefined) risks.push(d.risk[s]); });
  if (risks.includes('high'))   return 'danger';
  if (risks.includes('medium')) return 'warning';
  return 'success';
}

function riskTxt(r) { return r === 'danger' ? 'risco alto' : r === 'warning' ? 'risco médio' : 'risco baixo'; }

function countSel(p) {
  let n = 0;
  DATA.phases.forEach(ph => ph.items.forEach(it => { if (p.selectedPhases?.[it.id]) n++; }));
  DATA.details.forEach(d => { if (p.selectedDetails?.[d.id] !== undefined) n++; });
  return n;
}

function getHighRisks(p) {
  const out = [];
  DATA.phases.forEach(ph => ph.items.forEach(it => { if (p.selectedPhases?.[it.id] && it.risk === 'high') out.push({ label: it.label, obs: it.obs }); }));
  DATA.details.forEach(d => { const s = p.selectedDetails?.[d.id]; if (s !== undefined && d.risk[s] === 'high') out.push({ label: `${d.label}: ${d.options[s]}`, obs: d.obs }); });
  return out;
}

function getMedRisks(p) {
  const out = [];
  DATA.phases.forEach(ph => ph.items.forEach(it => { if (p.selectedPhases?.[it.id] && it.risk === 'medium') out.push({ label: it.label, obs: it.obs }); }));
  DATA.details.forEach(d => { const s = p.selectedDetails?.[d.id]; if (s !== undefined && d.risk[s] === 'medium') out.push({ label: `${d.label}: ${d.options[s]}`, obs: d.obs }); });
  return out;
}

function newProj() {
  return { name:'', client:'', baseHours:'', basePrice:'', hourlyRate:'', pricingMode:'fixed', currency:'BRL', objective:'', outscope:'', notes:'', selectedPhases:{}, selectedDetails:{} };
}

// ── Views ────────────────────────────────────────────────────────────────────
function showView(v) {
  view = v;
  document.querySelectorAll('[data-view]').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  render();
}

function startWizard() {
  editId = null;
  curProj = newProj();
  wizardStep = 1;
  view = 'wizard';
  document.querySelectorAll('[data-view]').forEach(t => t.classList.toggle('active', t.dataset.view === 'wizard'));
  render();
}

function render() {
  const el = document.getElementById('main-content');
  if (view === 'dashboard') el.innerHTML = renderDash();
  else if (view === 'wizard')   el.innerHTML = renderWizard();
  else if (view === 'admin')    el.innerHTML = renderAdmin();
  else if (view === 'proposal') el.innerHTML = renderProposal();
}

    ${byPhase.length ? `<div class="proposal-section"><div class="proposal-heading">O que está incluso nesta proposta</div>
      ${byPhase.map(ph=>`<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;color:var(--text3);margin-bottom:6px">${ph.label}</div>
      <ul class="proposal-list">${ph.items.map(it=>`<li>${it.label} — <span style="color:var(--text3)">${it.desc}</span></li>`).join('')}</ul></div>`).join('')}
    </div>` : ''}

    ${detSel.length ? `<div class="proposal-section"><div class="proposal-heading">Escopo técnico e contexto</div>
      <div class="tag-list">${detSel.map(d=>`<span class="tag"><b>${d.label}:</b> ${d.value}</span>`).join('')}</div>
    </div>` : ''}

    ${p.outscope ? `<div class="proposal-section"><div class="proposal-heading">Fora do escopo desta proposta</div><p class="proposal-text">${p.outscope}</p></div>` : ''}
    ${p.notes    ? `<div class="proposal-section"><div class="proposal-heading">Observações</div><p class="proposal-text">${p.notes}</p></div>` : ''}

    <p style="font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:12px;margin-top:16px">Gerado com Briefing Studio.</p>`;
}

// ── Admin ────────────────────────────────────────────────────────────────────
function renderAdmin() {
  return `
    <div style="font-size:17px;font-weight:600;margin-bottom:4px">Configurações</div>
    <p style="font-size:13px;color:var(--text3);margin-bottom:24px">Edite pesos e observações. Alterações valem para novos projetos.</p>

    ${DATA.phases.map(ph => `
      <div class="section-title">${ph.label}</div>
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr 70px 70px 106px;gap:8px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border)">
          <div style="font-size:11px;font-weight:600;color:var(--text3)">Entregável</div>
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-align:center">% tempo</div>
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-align:center">% preço</div>
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-align:center">Risco</div>
        </div>
        ${ph.items.map(it => `
          <div class="admin-item">
            <div class="admin-label">${it.label}</div>
            <div class="admin-inputs">
              <input type="number" value="${it.timeImpact}"  onchange="updPhase('${it.id}','timeImpact',this.value)">
              <input type="number" value="${it.priceImpact}" onchange="updPhase('${it.id}','priceImpact',this.value)">
              <select onchange="updPhase('${it.id}','risk',this.value)">
                <option value="low"    ${it.risk==='low'?'selected':''}>baixo</option>
                <option value="medium" ${it.risk==='medium'?'selected':''}>médio</option>
                <option value="high"   ${it.risk==='high'?'selected':''}>alto</option>
              </select>
            </div>
          </div>
          <div style="padding:4px 0 10px">
            <input type="text" value="${it.obs}" onchange="updPhase('${it.id}','obs',this.value)" style="font-size:12px;color:var(--text3)">
          </div>`).join('')}
      </div>`).join('')}

    <div class="section-title" style="margin-top:24px">Detalhes do projeto</div>
    ${DATA.details.map(d => `
      <div class="card" style="margin-bottom:10px">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px">${d.label}</div>
        ${d.options.map((opt, i) => `
          <div class="admin-item">
            <div class="admin-label" style="font-size:13px">${opt}</div>
            <div class="admin-inputs">
              <span style="font-size:11px;color:var(--text3)">tempo</span>
              <input type="number" value="${d.timeImpact[i]}"  onchange="updDet('${d.id}','timeImpact',${i},this.value)">
              <span style="font-size:11px;color:var(--text3)">preço</span>
              <input type="number" value="${d.priceImpact[i]}" onchange="updDet('${d.id}','priceImpact',${i},this.value)">
              <select onchange="updDet('${d.id}','risk',${i},this.value)">
                <option value="low"    ${d.risk[i]==='low'?'selected':''}>baixo</option>
                <option value="medium" ${d.risk[i]==='medium'?'selected':''}>médio</option>
                <option value="high"   ${d.risk[i]==='high'?'selected':''}>alto</option>
              </select>
            </div>
          </div>`).join('')}
        <div style="padding:8px 0 0">
          <input type="text" value="${d.obs}" onchange="updDetObs('${d.id}',this.value)" style="font-size:12px;color:var(--text3)">
        </div>
      </div>`).join('')}`;
}

// ── Export ───────────────────────────────────────────────────────────────────
function showExport(id) {
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-bg" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="modal-title" style="margin:0">Exportar proposta</div>
          <button class="btn ghost icon" onclick="closeModal()">✕</button>
        </div>
        <div class="export-opt" onclick="exportTxt('${id}')">
          <div class="export-icon" style="background:var(--bg2);font-size:20px">📄</div>
          <div><div class="export-name">Texto formatado (.txt)</div><div class="export-desc">Para colar em email, Notion ou Word.</div></div>
        </div>
        <div class="export-opt" onclick="exportPdf('${id}')">
          <div class="export-icon" style="background:var(--blue-light);font-size:20px">🖨</div>
          <div><div class="export-name">PDF via impressão</div><div class="export-desc">Abre a proposta formatada. Use Ctrl+P → Salvar como PDF.</div></div>
        </div>
      </div>
    </div>`;
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

function exportTxt(id) {
  const p = projects.find(x => x.id === id); if (!p) return;
  const { tTime, tPrice } = calcImpacts(p);
  const m = calcMoney(p);
  const byPhase = DATA.phases.map(ph => ({ label: ph.label, items: ph.items.filter(it => p.selectedPhases?.[it.id]) })).filter(ph => ph.items.length);
  const detSel  = DATA.details.filter(d => p.selectedDetails?.[d.id] !== undefined).map(d => ({ label: d.label, value: d.options[p.selectedDetails[d.id]] }));
  const hi = getHighRisks(p), med = getMedRisks(p);

  let txt = `PROPOSTA DE PROJETO — ${(p.name || 'Projeto').toUpperCase()}\n${'─'.repeat(60)}\n\n`;
  if (p.client) txt += `Cliente: ${p.client}\n\n`;
  if (p.objective) txt += `Objetivo\n${p.objective}\n\n`;
  txt += `Estimativa\n`;
  txt += `Impacto no tempo: +${tTime}%${p.baseHours ? ` (${Math.round(parseFloat(p.baseHours)*(1+tTime/100))}h estimadas)` : ''}\n`;
  if (p.pricingMode === 'hourly') {
    txt += `Valor hora: ${m.rate ? fmt(m.rate, p.currency) + '/h' : '—'}${m.base ? ` — Total: ${fmt(m.total, p.currency)}` : ''}\n\n`;
  } else {
    txt += `Impacto no preço: +${tPrice}%${m.base ? ` — ${fmt(m.total, p.currency)} (base: ${fmt(m.base, p.currency)})` : ''}\n\n`;
  }
  if (byPhase.length) {
    txt += `O que está incluso\n`;
    byPhase.forEach(ph => { txt += `\n${ph.label}\n`; ph.items.forEach(it => txt += `  → ${it.label}: ${it.desc}\n`); });
    txt += '\n';
  }
  if (detSel.length) { txt += `Escopo técnico\n`; detSel.forEach(d => txt += `  • ${d.label}: ${d.value}\n`); txt += '\n'; }
  if (p.outscope) txt += `Fora do escopo\n${p.outscope}\n\n`;
  if (p.notes)    txt += `Observações\n${p.notes}\n\n`;
  if (hi.length || med.length) {
    txt += `Pontos de atenção (interno)\n`;
    hi.forEach(r  => txt += `  [ALTO]  ${r.label}: ${r.obs}\n`);
    med.forEach(r => txt += `  [MÉDIO] ${r.label}: ${r.obs}\n`);
  }
  txt += `\n${'─'.repeat(60)}\nGerado com Briefing Studio\n`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
  a.download = `proposta-${(p.name||'projeto').toLowerCase().replace(/\s+/g,'-')}.txt`;
  a.click();
  closeModal();
}

function exportPdf(id) {
  const p = projects.find(x => x.id === id); if (!p) return;
  const { tTime, tPrice } = calcImpacts(p);
  const m      = calcMoney(p);
  const byPhase= DATA.phases.map(ph=>({label:ph.label,items:ph.items.filter(it=>p.selectedPhases?.[it.id])})).filter(ph=>ph.items.length);
  const detSel = DATA.details.filter(d=>p.selectedDetails?.[d.id]!==undefined).map(d=>({label:d.label,value:d.options[p.selectedDetails[d.id]]}));
  const phRows = DATA.phases.flatMap(ph=>ph.items.filter(it=>p.selectedPhases?.[it.id]).map(it=>({label:it.label,pct:p.pricingMode==='hourly'?it.timeImpact:it.priceImpact})));
  const detRows= DATA.details.filter(d=>p.selectedDetails?.[d.id]!==undefined&&(p.pricingMode==='hourly'?d.timeImpact[p.selectedDetails[d.id]]:d.priceImpact[p.selectedDetails[d.id]])!==0).map(d=>({label:`${d.label}: ${d.options[p.selectedDetails[d.id]]}`,pct:p.pricingMode==='hourly'?d.timeImpact[p.selectedDetails[d.id]]:d.priceImpact[p.selectedDetails[d.id]]}));

  const html = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Proposta — ${p.name||'Projeto'}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;color:#1a1a2e;padding:48px;max-width:780px;margin:0 auto;font-size:14px;line-height:1.7}
  h1{font-size:26px;font-weight:700;margin-bottom:4px}
  h2{font-size:15px;font-weight:700;margin:28px 0 10px;padding-bottom:6px;border-bottom:2px solid #5B4FCF;color:#5B4FCF}
  h3{font-size:13px;font-weight:700;color:#6b7280;margin:14px 0 5px}
  p{color:#4a5568;margin-bottom:8px}
  ul{list-style:none;padding:0}ul li{padding:4px 0;color:#4a5568}ul li::before{content:"→ ";color:#9ca3af}
  .meta{display:flex;gap:24px;margin:14px 0 28px;padding:16px;background:#f7f8fa;border-radius:8px;flex-wrap:wrap}
  .meta-item label{font-size:11px;color:#9ca3af;display:block}
  .meta-item span{font-size:16px;font-weight:700;color:#1a1a2e}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  td,th{padding:8px 12px;text-align:left;border-bottom:1px solid #f3f4f6}
  th{background:#f7f8fa;font-weight:700;font-size:11px;color:#6b7280;text-transform:uppercase}
  .total td{font-weight:700;font-size:15px;background:#EAE8FA;color:#5B4FCF}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{padding:3px 10px;border-radius:20px;font-size:12px;background:#f3f4f6;color:#4a5568}
  .footer{margin-top:48px;padding-top:16px;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af}
  @media print{body{padding:24px}@page{margin:20mm}}</style></head><body>
  <h1>${p.name||'Proposta de projeto'}</h1>
  ${p.client?`<p style="color:#6b7280;font-size:15px">${p.client}</p>`:''}
  <div class="meta">
    <div class="meta-item"><label>Impacto no tempo</label><span>+${tTime}%${p.baseHours?' ('+Math.round(parseFloat(p.baseHours)*(1+tTime/100))+'h)':''}</span></div>
    ${p.pricingMode==='hourly'
      ?`<div class="meta-item"><label>Valor hora</label><span>${m.rate?fmt(m.rate,p.currency)+'/h':'—'}</span></div>`
      :`<div class="meta-item"><label>Impacto no preço</label><span>+${tPrice}%</span></div>`}
    ${m.base?`<div class="meta-item"><label>Valor estimado</label><span>${fmt(m.total,p.currency)}</span></div>`:''}
  </div>
  ${p.objective?`<h2>Sobre o projeto</h2><p>${p.objective}</p>`:''}
  ${byPhase.length?`<h2>O que está incluso</h2>${byPhase.map(ph=>`<h3>${ph.label}</h3><ul>${ph.items.map(it=>`<li>${it.label} — ${it.desc}</li>`).join('')}</ul>`).join('')}`:''}
  ${detSel.length?`<h2>Escopo técnico</h2><div class="tags">${detSel.map(d=>`<span class="tag"><b>${d.label}:</b> ${d.value}</span>`).join('')}</div>`:''}
  ${m.base&&(phRows.length||detRows.length)?`<h2>Composição do preço</h2>
    <table><thead><tr><th>Item</th><th>%</th><th style="text-align:right">Valor</th></tr></thead><tbody>
    <tr><td>Preço base</td><td>—</td><td style="text-align:right">${fmt(m.base,p.currency)}</td></tr>
    ${phRows.map(r=>`<tr><td>${r.label}</td><td>+${r.pct}%</td><td style="text-align:right">${fmt(m.base*r.pct/100,p.currency)}</td></tr>`).join('')}
    ${detRows.map(r=>`<tr><td>${r.label}</td><td>${r.pct>0?'+':''}${r.pct}%</td><td style="text-align:right">${fmt(m.base*r.pct/100,p.currency)}</td></tr>`).join('')}
    <tr class="total"><td>Total estimado</td><td>+${p.pricingMode==='hourly'?tTime:tPrice}%</td><td style="text-align:right">${fmt(m.total,p.currency)}</td></tr>
    </tbody></table>`:''}
  ${p.outscope?`<h2>Fora do escopo</h2><p>${p.outscope}</p>`:''}
  ${p.notes?`<h2>Observações</h2><p>${p.notes}</p>`:''}
  <div class="footer">Gerado com Briefing Studio.</div>
  <script>window.onload=()=>window.print()<\/script></body></html>`;

  window.open(URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'})),'_blank');
  closeModal();
}

// ── Actions ───────────────────────────────────────────────────────────────────
function togglePhase(id) { curProj.selectedPhases = curProj.selectedPhases || {}; curProj.selectedPhases[id] = !curProj.selectedPhases[id]; render(); }
function selDetail(id, i)  { curProj.selectedDetails = curProj.selectedDetails || {}; curProj.selectedDetails[id] = (curProj.selectedDetails[id] === i) ? undefined : i; render(); }
function clearDetail(id)   { if (curProj.selectedDetails) delete curProj.selectedDetails[id]; render(); }

function nextStep() {
  if (wizardStep === 1) {
    curProj.name      = document.getElementById('w-name')?.value  || '';
    curProj.client    = document.getElementById('w-client')?.value || '';
    curProj.objective = document.getElementById('w-obj')?.value   || '';
    curProj.outscope  = document.getElementById('w-out')?.value   || '';
    curProj.baseHours  = document.getElementById('w-hours')?.value || '';
    curProj.basePrice  = document.getElementById('w-price')?.value || curProj.basePrice || '';
    curProj.hourlyRate = document.getElementById('w-rate')?.value  || curProj.hourlyRate || '';
    curProj.currency   = document.getElementById('w-cur')?.value   || 'BRL';
  }
  wizardStep = Math.min(4, wizardStep + 1);
  render();
}

function prevStep() { wizardStep = Math.max(1, wizardStep - 1); render(); }

async function saveProj() {
  curProj.notes = document.getElementById('w-notes')?.value || '';
  const btn = document.querySelector('.nav-footer .btn.primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando…'; }
  try {
    const savedId = await saveProject(curProj);
    editId = savedId;
    curProj.id = savedId;
    view = 'proposal';
    render();
  } catch (e) {
    alert('Erro ao salvar: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Salvar e gerar proposta ↗'; }
  }
}

function openProj(id) { editId = id; view = 'proposal'; render(); }

function editProj(id) {
  editId  = id;
  curProj = JSON.parse(JSON.stringify(projects.find(x => x.id === id) || newProj()));
  wizardStep = 1;
  view = 'wizard';
  document.querySelectorAll('[data-view]').forEach(t => t.classList.remove('active'));
  render();
}

async function confirmDelete(id) {
  const p = projects.find(x => x.id === id);
  if (confirm(`Remover "${p?.name || 'este projeto'}"? Esta ação não pode ser desfeita.`)) {
    await deleteProject(id);
  }
}

function setPricingMode(mode) {
  curProj.name       = document.getElementById('w-name')?.value   || curProj.name;
  curProj.client     = document.getElementById('w-client')?.value  || curProj.client;
  curProj.objective  = document.getElementById('w-obj')?.value    || curProj.objective;
  curProj.outscope   = document.getElementById('w-out')?.value    || curProj.outscope;
  curProj.baseHours  = document.getElementById('w-hours')?.value  || curProj.baseHours;
  curProj.basePrice  = document.getElementById('w-price')?.value  || curProj.basePrice;
  curProj.hourlyRate = document.getElementById('w-rate')?.value   || curProj.hourlyRate;
  curProj.currency   = document.getElementById('w-cur')?.value    || curProj.currency;
  curProj.pricingMode = mode;
  render();
}

function updPhase(id, field, val) { DATA.phases.forEach(ph => ph.items.forEach(it => { if (it.id === id) it[field] = field === 'risk' ? val : Number(val); })); }
function updDet(id, field, idx, val) { const d = DATA.details.find(x => x.id === id); if (d) d[field][idx] = field === 'risk' ? val : Number(val); }
function updDetObs(id, val) { const d = DATA.details.find(x => x.id === id); if (d) d.obs = val; }
</script>
</body>
